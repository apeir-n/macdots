theme = "transpo"

[editor]
line-number = "relative"
scroll-lines = 1
auto-format = false
bufferline = "multiple"
color-modes = true
default-yank-register= "+"

    [editor.cursor-shape]
    insert = "bar"
    normal = "block"
    select = "underline"

    [editor.file-picker]
    hidden = false

    [editor.smart-tab]
    enable = false

    # change it for machines using terminess cuz its ugly
    # [editor.soft-wrap]
    # wrap-indicator = ""

    [editor.statusline]
    left = [
        "mode",
        "file-base-name",
        "file-modification-indicator",
    ]
    right = [
        "spinner",
        "diagnostics",
        "read-only-indicator",
        "position",
        "file-type",
        "total-line-numbers",
    ]
    diagnostics = [
        "warning",
        "error",
    ]
    workspace-diagnostics = [
        "warning",
        "error",
    ]
    mode.normal = "NORMAL"
    mode.insert = "INSERT"
    mode.select = "SELECT"

[keys.normal]
X = "extend_line_above" # what it should be by default
H = "goto_previous_buffer"
L = "goto_next_buffer"
C-R = ":reload-all"
Cmd-s = ":write"

    [keys.normal.tab]
    w = ":toggle soft-wrap.enable"
    s = "split_selection_on_newline"
    minus = "merge_selections"
    _ = "merge_consecutive_selections"
    c = "copy_selection_on_prev_line"
    h = "flip_selections"
    H = "ensure_selections_forward"

[keys.select]

    [keys.select.tab]
    s = "split_selection_on_newline"
    minus = "merge_selections"
    _ = "merge_consecutive_selections"
    c = "copy_selection_on_prev_line"
    h = "flip_selections"
    H = "ensure_selections_forward"
