#theme = "base16_transparent"
theme = "transpo"

[editor]
line-number = "relative"
scroll-lines = 1
auto-format = false
bufferline = "multiple"
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "file-base-name", "file-modification-indicator"]
right = ["diagnostics", "position", "file-encoding", "file-type", "total-line-numbers"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
diagnostics = ["warning", "error"]
workspace-diagnostics = ["warning", "error"]
